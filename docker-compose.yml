services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: pulso_crm
      POSTGRES_USER: pulso
      POSTGRES_PASSWORD: pulso
      TZ: America/Fortaleza
    ports:
      - "5432:5432"
    volumes:
      - pulso_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pulso -d pulso_crm"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile
    depends_on:
      db:
        condition: service_healthy
    env_file: [.env]
    ports: ["3000:3000"]
    volumes:
      - pulso_files:/app/storage/private

volumes:
  pulso_pgdata:
  pulso_files:
